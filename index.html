<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ScoreDealer">
<meta name="theme-color" content="#07070f">
<title>ScoreDealer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#07070f;color:#ede8f5;font-family:system-ui,-apple-system,sans-serif;overscroll-behavior:none;transition:background 0.3s}
button,input{font-family:inherit;-webkit-appearance:none}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-100vh) scale(1.3);opacity:0}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes fadeOut{0%,70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-24px)}}
@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-12px)}40%{transform:translateX(12px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes slideUp{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes trophyPop{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.3) rotate(5deg)}80%{transform:scale(0.9)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes winnerGlow{0%,100%{text-shadow:0 0 20px rgba(232,184,109,0.5)}50%{text-shadow:0 0 40px rgba(232,184,109,0.9),0 0 60px rgba(232,184,109,0.4)}}
.emoji-particle{position:fixed;pointer-events:none;z-index:9999;animation:floatUp 1.8s ease-out forwards}
.confetti-piece{position:fixed;pointer-events:none;z-index:9999;border-radius:2px;animation:confettiFall 2s ease-in forwards}
.toast-overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:9998;pointer-events:none}
.toast-msg{background:rgba(13,13,20,0.97);border-radius:20px;padding:22px 32px;text-align:center;animation:popIn 0.4s ease-out,fadeOut 0.5s ease-in 2.2s forwards;max-width:290px}
.toast-emoji{font-size:3rem;margin-bottom:8px}
.toast-text{font-size:1.1rem;font-weight:800;color:#ede8f5}
.toast-sub{font-size:0.8rem;color:#5a6a8a;margin-top:4px}
.slide-up{animation:slideUp 0.4s ease-out forwards}
</style>
</head>
<body>
<div id="root"></div>
<div id="particles"></div>
<div id="toast-container"></div>
<script>
// PWA: register inline service worker
if('serviceWorker' in navigator){
  const sw=`
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));});
`;
  const blob=new Blob([sw],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
<script>
const _rand=arr=>arr[Math.floor(Math.random()*arr.length)];
function spawnEmojis(emojis,count=12){const c=document.getElementById('particles');for(let i=0;i<count;i++){const el=document.createElement('div');el.className='emoji-particle';el.textContent=emojis[Math.floor(Math.random()*emojis.length)];el.style.left=Math.random()*100+'vw';el.style.top=(50+Math.random()*40)+'vh';el.style.fontSize=(1.2+Math.random()*1.5)+'rem';el.style.animationDelay=(Math.random()*0.5)+'s';c.appendChild(el);setTimeout(()=>el.remove(),2500);}}
function spawnConfetti(){const c=document.getElementById('particles');const colors=['#e8b86d','#7ec96a','#6ab4c9','#c96a6a','#a06ae8','#64a0ff','#f5d08a'];for(let i=0;i<70;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.top='-10px';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.width=(6+Math.random()*8)+'px';el.style.height=(6+Math.random()*8)+'px';el.style.animationDelay=(Math.random()*1.5)+'s';el.style.animationDuration=(1.5+Math.random())+'s';c.appendChild(el);setTimeout(()=>el.remove(),3500);}}
function showToast(e,t,s,bc='rgba(232,184,109,0.3)'){const c=document.getElementById('toast-container');const el=document.createElement('div');el.className='toast-overlay';el.innerHTML=`<div class="toast-msg" style="border:2px solid ${bc}"><div class="toast-emoji">${e}</div><div class="toast-text">${t}</div><div class="toast-sub">${s}</div></div>`;c.appendChild(el);setTimeout(()=>el.remove(),3000);}
function shake(){document.body.style.animation='shakeX 0.5s ease-out';setTimeout(()=>document.body.style.animation='',600);}
window.triggerShame=n=>{showToast(_rand(['💀','🤡','🫠','😭','🪦','🤦']),_rand(['Gesloopt!','Oeps!','Nooooo!','R.I.P.','GEBOMBARDEERD!']),`${n} eet +500 😬`);shake();spawnEmojis(['💀','🤡','😭','💸','🪦','🫠'],16);};
window.triggerBonus=n=>{showToast(_rand(['🤑','💰','😎','🔥','⭐','💎']),_rand(['CHA-CHING!','Geldschieter!','ON FIRE!','DIAMANT!']),`${n} pakt de bonus!`,'rgba(100,180,255,0.3)');spawnEmojis(['💰','⭐','🤑','✨','💎','🎴'],14);spawnConfetti();};
window.triggerWinner=(n,j)=>{showToast(j?_rand(['🃟','🌟','🎰']):_rand(['👑','🏆','🚀','🎯','⚡']),j?_rand(['JOKER WIN!','JACKPOT!']):_rand(['KONING!','WINNAAR!','OMHOOG!']),`${n} opent de ronde!`);spawnEmojis(j?['🃟','⭐','💫','✨','🌟']:['👑','🏆','🎉','🥳','⚡'],14);spawnConfetti();};
window.triggerChuft=(n,j)=>{showToast(_rand(['🤯','👾','🫡','🎪']),_rand(['CHUFT!!!','CHEAT CODE!','SPEKTAKEL!']),`${n} speelt chuft${j?' met joker!':'!'}`,'rgba(160,106,232,0.4)');spawnEmojis(['🤯','🀄','👾','🎪','💥','🌟','🃟'],20);spawnConfetti();spawnConfetti();};
window.triggerDraait=n=>{showToast(_rand(['🐢','😤','🤬','💸']),_rand(['NET TE LAAT!','NOOOO!','BETALEN MAAR']),`${n} draaide te lang`,'rgba(232,149,109,0.3)');shake();spawnEmojis(['💸','😤','🤬','🐢','💀','😭'],16);};
window.triggerRandom=()=>{_rand([()=>spawnEmojis(['🃏','♠️','♥️','♦️','♣️'],8),()=>spawnEmojis(['✨','⭐','💫'],6),()=>spawnEmojis(['👀','🎯','🎲'],6)])();};
(function(){const t=localStorage.getItem('sd_theme')||'dark';document.body.style.background=t==='dark'?'#07070f':'#f0f2ff';document.body.style.color=t==='dark'?'#ede8f5':'#1a1a2e';})();
window.fx={
  win:(t)=>{showToast('🏆','GEWONNEN!',`${t} haalt het bod!`,'rgba(126,201,106,0.3)');spawnConfetti();spawnEmojis(['🏆','🎉','⚡','👑','🥳'],14);},
  lose:(t,b)=>{showToast('💀','GEZAKT!',`${t} gaat -${b}`);shake();spawnEmojis(['💀','😭','💸','🤡','🪦'],16);},
  king:(t)=>{showToast('👑','KING!!!',`${t} pakt alle 13 slagen!`,'rgba(232,184,109,0.5)');spawnConfetti();spawnConfetti();spawnEmojis(['👑','🤯','💥','🌟','🎰','⚡'],20);},
  kingLose:(t)=>{showToast('☠️','KING GEFAALD!',`${t} verliest direct!`,'rgba(201,106,106,0.4)');shake();shake();spawnEmojis(['☠️','💀','😱','🔥','💸','🤦'],20);},
  zero:(t)=>{showToast('🫠','NUL SETJES!',`${t} gaat -13!`);shake();spawnEmojis(['🫠','😭','💸','🤡','🪦','💀'],16);},
  one:(t)=>{showToast('😤','MAAR 1!',`${t} gaat min het bod`);shake();spawnEmojis(['😤','😬','💸','🐢'],12);},
  random:()=>window.triggerRandom(),
  gameWin:(t)=>{showToast('🏆','SPEL GEWONNEN!',`${t} heeft 61+ punten!`,'rgba(232,184,109,0.5)');spawnConfetti();spawnConfetti();spawnEmojis(['👑','🏆','🎉','⭐','💫','🌟'],24);},
  pishti:(n,bj)=>{showToast(bj?'🃏':'🔥',bj?'BOER PISHTI!!!':'PISHTI!',`${n} sloeg perfect!`,'rgba(126,201,106,0.4)');spawnEmojis(bj?['🃏','👑','💥','🤯','⚡']:['🔥','✨','💫','⭐','🎯'],bj?20:14);if(bj){spawnConfetti();spawnConfetti();}else spawnConfetti();},
  penalty:(t)=>{showToast('😬','STRAF!',`${t} gaat -16!`,'rgba(201,106,106,0.3)');shake();spawnEmojis(['😬','💸','😭','💀'],12);},
  pishtiWin:(t)=>{showToast('🏆','151 PUNTEN!',`${t} wint het spel!`,'rgba(126,201,106,0.5)');spawnConfetti();spawnConfetti();spawnEmojis(['🏆','👑','🎉','🌟','💫','⚡'],24);},
  trixKing:(t)=>{showToast('👑','KONING!',`${t} bepaalt de volgorde!`,'rgba(232,184,109,0.4)');spawnEmojis(['👑','🃏','♥️','⭐'],12);},
  trixFirst:(t)=>{showToast('🥇','EERSTE!',`${t} is kaarten kwijt! +200`,'rgba(126,201,106,0.5)');spawnConfetti();spawnEmojis(['🥇','🎉','⚡','🌟'],16);},
  trixWin:(t)=>{showToast('🏆','SPEL GEWONNEN!',`${t} wint Trix!`,'rgba(232,184,109,0.5)');spawnConfetti();spawnConfetti();spawnEmojis(['👑','🏆','🎉','🌟','💫','🃏'],24);},
};
</script>

function loadNames(k){try{return JSON.parse(localStorage.getItem('sd_n_'+k)||'null');}catch{return null;}}
function saveNames(k,v){try{localStorage.setItem('sd_n_'+k,JSON.stringify(v));}catch{}}
function loadTheme(){return localStorage.getItem('sd_theme')||'dark';}
function saveTheme(t){localStorage.setItem('sd_theme',t);}
function loadStats(){try{return JSON.parse(localStorage.getItem('sd_stats')||'{}')}catch{return{}}}
function saveStats(s){try{localStorage.setItem('sd_stats',JSON.stringify(s))}catch{}}
function recordWin(game,name){const s=loadStats();if(!s[game])s[game]={};if(!s[game][name])s[game][name]={w:0,g:0};s[game][name].w++;s[game][name].g++;saveStats(s);}
function recordGame(game,names){const s=loadStats();if(!s[game])s[game]={};names.forEach(n=>{if(!n)return;if(!s[game][n])s[game][n]={w:0,g:0};s[game][n].g++;});saveStats(s);}

function Btn({onTap,children,style={}}){return <button onPointerDown={()=>{haptic("medium");if(onTap)onTap();}} style={{width:"100%",padding:15,border:"none",borderRadius:12,fontSize:"1rem",fontWeight:800,...TAP,...style}}>{children}</button>;}
function Pill({active,onTap,children,ac="#e8b86d"}){return <button onPointerDown={()=>{haptic("light");if(onTap)onTap();}} style={{padding:"10px 14px",borderRadius:40,fontWeight:700,fontSize:"0.85rem",border:`2px solid ${active?ac:"#2a3040"}`,background:active?ac:"transparent",color:active?"#0d0d14":"#5a6a8a",...TAP}}>{children}</button>;}
function IconBtn({onTap,active,color,children,disabled,small}){const sz=small?40:48;return <button onPointerDown={disabled?undefined:onTap} style={{width:sz,height:sz,borderRadius:10,border:`2px solid ${active?color:"#2a3040"}`,background:active?`${color}33`:"transparent",fontSize:small?"0.9rem":"1.1rem",opacity:disabled?0.25:1,...TAP,flexShrink:0}}>{children}</button>;}
function InfoBtn({onTap,color="#e8b86d"}){return <button onPointerDown={onTap} style={{width:32,height:32,borderRadius:"50%",border:`2px solid ${color}88`,background:"transparent",color,fontWeight:800,fontSize:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,...TAP}}>i</button>;}

const TC={bg:"#12080e",surface:"#1e0f18",input:"#0a0508",pink:"#e86a8a",gold:"#e8b86d",green:"#7ec96a",red:"#e86a6a",muted:"#6a4a58",text:"#f5e8ee"};

function TrixApp({onBack,lang}){
const TL=LANG[lang]||LANG.nl;

function chooseContract(id){setActiveContract(id);setPhase("playContract");setContractScores(["","","",""]);}
function saveContractScore(){
const contract=CONTRACTS.find(c=>c.id===activeContract);
let scores;
if(contract.id==='trix'){
scores=contractScores.map(v=>{const pos=parseInt(v);return isNaN(pos)?0:TRIX_PTS[pos-1]||0;});
if(scores.reduce((s,v)=>s+v,0)!==500){alert("Vul alle 4 posities in!");return;}
}else{
scores=contractScores.map(v=>{const n=parseInt(v);return isNaN(n)?0:n*contract.pts;});
const total=contractScores.reduce((s,v)=>s+(parseInt(v)||0),0);
if(total!==contract.maxTotal){alert(`Totaal moet ${contract.maxTotal} zijn!`);return;}
}
const done=[...completedContracts,{id:activeContract,scores}];
setCompletedContracts(done);
if(contract.id==='trix'){const first=scores.indexOf(200);if(first>=0)setTimeout(()=>window.fx.trixFirst(names[first]),300);}
else{scores.forEach((s,i)=>{if(s<-50)setTimeout(()=>shake(),300+i*100);});}

setKingdoms(newKingdoms);setCompletedContracts([]);setPhase("chooseContract");setActiveContract(null);setContractScores(["","","",""]);

}else{setPhase("chooseContract");setActiveContract(null);setContractScores(["","","",""]);}
}

const playedIds=completedContracts.map(c=>c.id);

return(<div style={{background:TC.bg,minHeight:"100vh",padding:"24px 16px 80px",maxWidth:540,margin:"0 auto"}}>

{completedContracts.length>0&&<button onPointerDown={undoRound} style={{padding:"4px 10px",borderRadius:8,border:"1.5px solid rgba(201,106,106,0.4)",background:"transparent",color:TC.red,fontSize:"0.72rem",fontWeight:700,...TAP,marginBottom:12}}>{TL.ongedaan}</button>}
{phase==="chooseContract"&&(<div style={tCard}>
<div style={{fontWeight:700,color:TC.gold,marginBottom:4}}>👑 {names[currentKing]} — kies een contract</div>
<div style={{fontSize:"0.75rem",color:TC.muted,marginBottom:16}}>Welk spel spelen we nu?</div>
{available.map(c=>{const sel=activeContract===c.id;return(<button key={c.id} onPointerDown={()=>setActiveContract(sel?null:c.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",borderRadius:12,border:`2px solid ${sel?c.color:"#3a1828"}`,background:sel?`${c.color}18`:"transparent",width:"100%",marginBottom:8,textAlign:"left",...TAP}}><span style={{fontSize:"1.4rem"}}>{c.emoji}</span><div style={{flex:1}}><div style={{fontWeight:700,color:sel?c.color:TC.text}}>{c.name}</div><div style={{fontSize:"0.7rem",color:TC.muted}}>{c.desc}</div></div>{sel&&<span style={{color:c.color,fontWeight:800}}>✓</span>}</button>);})}
<Btn onTap={()=>{if(activeContract)chooseContract(activeContract);}} style={{background:activeContract?TC.pink:"#3a1828",color:activeContract?"#fff":TC.muted,marginTop:8}}>▶️ Spelen</Btn>
</div>)}
{phase==="playContract"&&contract&&(<div style={tCard}>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><span style={{fontSize:"1.8rem"}}>{contract.emoji}</span><div><div style={{fontWeight:800,color:contract.color}}>{contract.name}</div><div style={{fontSize:"0.72rem",color:TC.muted}}>{contract.desc}</div></div></div>
{contract.id==='trix'?(
<div><div style={{fontSize:"0.78rem",color:TC.muted,marginBottom:12}}>Vul eindpositie in (1=eerste klaar, 4=laatste)</div>
{names.map((n,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><div style={{flex:1,fontWeight:600,color:TC.text}}>{n}</div><div style={{display:"flex",gap:6}}>{[1,2,3,4].map(pos=>(<button key={pos} onPointerDown={()=>{const ns=[...contractScores];const prev=ns.indexOf(String(pos));if(prev>=0&&prev!==i)ns[prev]="";ns[i]=ns[i]===String(pos)?"":String(pos);setContractScores(ns);if(ns[i]===String(pos)&&pos===1)window.fx.trixFirst(n);}} style={{width:36,height:36,borderRadius:8,border:`2px solid ${contractScores[i]===String(pos)?TC.green:"#3a1828"}`,background:contractScores[i]===String(pos)?"rgba(126,201,106,0.2)":"transparent",color:contractScores[i]===String(pos)?TC.green:TC.muted,fontWeight:800,...TAP}}>{pos}</button>))}</div>{contractScores[i]&&<div style={{fontSize:"0.8rem",fontWeight:800,color:TC.green,width:36,textAlign:"right"}}>+{TRIX_PTS[parseInt(contractScores[i])-1]}</div>}</div>))}</div>
):(
<div><div style={{fontSize:"0.78rem",color:TC.muted,marginBottom:12}}>{contract.id==='king'?"Wie heeft de Hartenheer?":contract.id==='queens'?"Hoeveel vrouwen per speler? (totaal = 4)":contract.id==='diamonds'?"Hoeveel ruitenkaarten per speler? (totaal = 13)":TL.trixSlagenHint}</div>
{names.map((n,i)=>{const val=parseInt(contractScores[i])||0,pts=val*contract.pts,usedByOthers=contractScores.reduce((s,v,j)=>j===i?s:s+(parseInt(v)||0),0),canAdd=val<contract.maxTotal&&usedByOthers+val+1<=contract.maxTotal;return(<div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><div style={{flex:1,fontWeight:600,color:TC.text}}>{n}</div><div style={{display:"flex",alignItems:"center",gap:8}}><button onPointerDown={()=>{const ns=[...contractScores];ns[i]=String(Math.max(0,val-1));setContractScores(ns);}} style={{width:36,height:36,borderRadius:8,border:"2px solid #3a1828",background:"transparent",color:val>0?TC.text:TC.muted,fontSize:"1.2rem",opacity:val>0?1:0.3,...TAP}}>−</button><div style={{width:32,textAlign:"center",fontSize:"1.2rem",fontWeight:800,color:TC.text}}>{val}</div><button onPointerDown={()=>{if(canAdd){const ns=[...contractScores];ns[i]=String(val+1);setContractScores(ns);}}} style={{width:36,height:36,borderRadius:8,border:"2px solid #3a1828",background:"transparent",color:canAdd?TC.text:TC.muted,fontSize:"1.2rem",opacity:canAdd?1:0.3,...TAP}}>+</button></div><div style={{width:52,textAlign:"right",fontWeight:800,color:pts<0?TC.red:TC.muted,fontSize:"0.85rem"}}>{pts!==0?pts:"-"}</div></div>);})}
{(()=>{const current=contractScores.reduce((s,v)=>s+(parseInt(v)||0),0),ok=current===contract.maxTotal;return <div style={{fontSize:"0.72rem",textAlign:"center",marginBottom:8,padding:"6px",borderRadius:8,background:ok?"rgba(126,201,106,0.1)":"transparent",color:ok?TC.green:TC.muted}}>Totaal: {current}/{contract.maxTotal} {ok?"✓":""}</div>;})()} 
</div>)}
<Btn onTap={saveContractScore} style={{background:TC.pink,color:"#fff",marginTop:8}}>✅ {completedContracts.length===4?"Koninkrijk afsluiten":"Contract opslaan"}</Btn>
</div>)}
{kingdoms.length>0&&(<div style={{...tCard,marginTop:8}}><span style={tLbl}>Koninkrijken</span>{kingdoms.map((k,ki)=>(<div key={ki} style={{marginBottom:12,paddingBottom:12,borderBottom:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:"0.72rem",color:TC.gold,fontWeight:700,marginBottom:6}}>👑 {ki+1} — {names[k.kingIdx]}</div><div style={{display:"flex",gap:6}}>{names.map((n,pi)=>{const total=k.contracts.reduce((s,c)=>s+(c.scores[pi]||0),0);return <div key={pi} style={{flex:1,textAlign:"center",fontSize:"0.75rem"}}><div style={{color:TC.muted,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n}</div><div style={{fontWeight:800,color:total<0?TC.red:TC.green}}>{total>0?"+":""}{total}</div></div>;})}</div></div>))}</div>)}
<Btn onTap={reset} style={{background:"transparent",color:TC.red,border:"2px solid rgba(232,106,106,0.3)",marginTop:8}}>{TL.nieuwSpel}</Btn>
</div>);}
// ── OGLAN ──
const GC={bg:"#100c06",surface:"#1a1408",input:"#0a0804",orange:"#ff9966",gold:"#e8b86d",green:"#7ec96a",red:"#c96a6a",muted:"#6a5a3a",text:"#f5ede0"};
const gCard={background:GC.surface,borderRadius:16,padding:20,marginBottom:16};
const gLbl={fontSize:"0.68rem",textTransform:"uppercase",letterSpacing:".1em",color:GC.muted,marginBottom:10,display:"block"};
function OglanApp({onBack,lang}){
const TL=LANG[lang]||LANG.nl;
const [screen,setScreen]=useState("setup");
const [infoOpen,setInfoOpen]=useState(false);
const [nP,setNP]=useState(4);
const [mode,setMode]=useState("ind");
const [names,setNames]=useState(loadNames("oglan")||["Speler 1","Speler 2","Speler 3","Speler 4"]);
const [winScore,setWinScore]=useState(11);
const [rounds,setRounds]=useState([]);
const [pts,setPts]=useState(Array(4).fill(""));
function setName(i,v){const n=[...names];n[i]=v;setNames(n);}
function setPt(i,v){const a=[...pts];a[i]=v;setPts(a);}
const players=names.slice(0,nP);
const totals=players.map((_,i)=>rounds.reduce((s,r)=>s+(r.scores[i]||0),0));
function undoRound(){haptic("light");setRounds(r=>r.slice(0,-1));}
function saveRound(){
const vals=players.map((_,i)=>parseInt(pts[i])||0);
const total=vals.reduce((s,v)=>s+v,0);
if(total!==5){alert(`Totaal moet 5 zijn (nu: ${total})!`);return;}
let scores;
if(mode==="2v2"&&nP===4){scores=[vals[0]+vals[2],vals[1]+vals[3]];}else{scores=vals;}
const nr=[...rounds,{scores,vals}];
setRounds(nr);setPts(Array(4).fill(""));
let newTotals;
if(mode==="2v2"&&nP===4){newTotals=[0,0].map((_,i)=>nr.reduce((s,r)=>s+(r.scores[i]||0),0));}
else{newTotals=players.map((_,i)=>nr.reduce((s,r)=>s+(r.scores[i]||0),0));}
const winners=mode==="2v2"?newTotals.filter(t=>t>=winScore):newTotals.filter(t=>t>=winScore);
if(winners.length>0){
let winName;
if(mode==="2v2"&&nP===4){const wi=newTotals.indexOf(Math.max(...newTotals));winName=`${names[wi===0?0:1]}+${names[wi===0?2:3]}`;}
else{const wi=newTotals.indexOf(Math.max(...newTotals));winName=names[wi];}
recordWin('oglan',winName);recordGame('oglan',players);
setTimeout(()=>{setScreen("winner");haptic("success");spawnConfetti();spawnConfetti();},300);
}
}
function reset(){setScreen("setup");setRounds([]);setPts(Array(4).fill(""));}
const BB=<button onPointerDown={onBack} style={{background:"transparent",border:"none",color:GC.muted,fontSize:"0.85rem",padding:"0 0 16px",...TAP}}>{TL.terug}</button>;
if(screen==="setup")return(<div style={{background:GC.bg,minHeight:"100vh",padding:"24px 16px 80px",maxWidth:500,margin:"0 auto"}}>{BB}<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:4}}><h1 style={{color:GC.orange,fontSize:"2rem",fontWeight:800}}>🎴 Oğlan</h1><InfoBtn onTap={()=>setInfoOpen(true)} color={GC.orange}/></div><InfoModal open={infoOpen} onClose={()=>setInfoOpen(false)} {...INFO.oglan}/><p style={{textAlign:"center",color:GC.muted,marginBottom:28}}>Kaarten eten · Punten verzamelen · Winnen</p>
<div style={gCard}><span style={gLbl}>👥 {TL.hoeveel}</span><div style={{display:"flex",gap:8,marginBottom:14}}>{[2,3,4].map(n=><Pill key={n} active={nP===n} onTap={()=>{setNP(n);if(n!==4)setMode("ind");}} ac={GC.orange}>{TL.nSpelers.replace("{n}",n)}</Pill>)}</div>
{nP===4&&<><span style={gLbl}>🎮 {TL.modus}</span><div style={{display:"flex",gap:8}}><Pill active={mode==="ind"} onTap={()=>setMode("ind")} ac={GC.orange}>{TL.individueel}</Pill><Pill active={mode==="2v2"} onTap={()=>setMode("2v2")} ac={GC.orange}>{TL.tegenTwee}</Pill></div></>}</div>
<div style={gCard}><span style={gLbl}>✏️ {TL.namen}</span>{Array.from({length:nP},(_,i)=>(<div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"center"}}><span style={{color:GC.muted,fontSize:"0.8rem",width:20,textAlign:"center"}}>{i+1}</span><input style={{flex:1,background:GC.input,border:"2px solid #3a2a10",borderRadius:10,padding:"12px 14px",color:GC.text,fontSize:"1rem",fontWeight:600,outline:"none"}} value={names[i]} onChange={e=>setName(i,e.target.value)}/>{mode==="2v2"&&nP===4&&<span style={{fontSize:"0.7rem",color:GC.muted,width:50,textAlign:"right"}}>{i%2===0?"🔵 team A":"🔴 team B"}</span>}</div>))}</div>
<div style={gCard}><span style={gLbl}>🏆 {TL.winscore}</span><div style={{display:"flex",gap:8}}>{[11,21].map(n=><Pill key={n} active={winScore===n} onTap={()=>setWinScore(n)} ac={GC.orange}>{n} {TL.punten}</Pill>)}</div></div>
<Btn onTap={()=>{saveNames("oglan",names.slice(0,nP));window.triggerRandom();setScreen("game");}} style={{background:GC.orange,color:"#0d0d14"}}>{TL.spelStarten}</Btn></div>);
if(screen==="winner"){
let winTotals,winNames;
if(mode==="2v2"&&nP===4){winTotals=[rounds.reduce((s,r)=>s+(r.scores[0]||0),0),rounds.reduce((s,r)=>s+(r.scores[1]||0),0)];winNames=[`${names[0]}+${names[2]}`,`${names[1]}+${names[3]}`];}
else{winTotals=totals;winNames=names.slice(0,nP);}
const wi=winTotals.indexOf(Math.max(...winTotals));
return(<div style={{background:GC.bg,minHeight:"100vh",padding:"60px 16px",maxWidth:500,margin:"0 auto",textAlign:"center"}}><div style={{fontSize:"5rem",marginBottom:16,animation:"trophyPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards"}}>🏆</div><div style={{fontSize:"1.8rem",fontWeight:800,color:GC.orange,marginBottom:8,animation:"winnerGlow 2s ease-in-out infinite"}}>{winNames[wi]} {TL.winnerWint}</div><div style={{color:GC.muted,marginBottom:24}}>Eerste op {winScore} punten</div><div style={{background:GC.surface,borderRadius:14,padding:16,marginBottom:28}}>{winNames.map((n,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><span style={{fontWeight:600,color:i===wi?GC.orange:GC.text}}>{i===wi?"🏆 ":""}{n}</span><span style={{fontWeight:800,color:GC.gold}}>{winTotals[i]}</span></div>))}</div><Btn onTap={reset} style={{background:GC.orange,color:"#0d0d14",marginBottom:12}}>🎴 Nieuw spel</Btn><Btn onTap={onBack} style={{background:"transparent",color:GC.muted,border:"2px solid #3a2a10"}}>{TL.terug}</Btn></div>);}
const numTeams=mode==="2v2"&&nP===4?2:nP;
let displayTotals,displayNames;
if(mode==="2v2"&&nP===4){displayTotals=[rounds.reduce((s,r)=>s+(r.scores[0]||0),0),rounds.reduce((s,r)=>s+(r.scores[1]||0),0)];displayNames=[`${names[0]}+${names[2]}`,`${names[1]}+${names[3]}`];}
else{displayTotals=totals;displayNames=names.slice(0,nP);}
const maxD=displayTotals.length?Math.max(...displayTotals):0;
const ptsLabel=mode==="2v2"?TL.teamLabel:TL.spelersLabel;
return(<div style={{background:GC.bg,minHeight:"100vh",padding:"24px 16px 80px",maxWidth:540,margin:"0 auto"}}>
{BB}<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:16}}><h1 style={{color:GC.orange,fontSize:"1.8rem",fontWeight:800}}>🎴 Oğlan</h1><InfoBtn onTap={()=>setInfoOpen(true)} color={GC.orange}/></div>
<InfoModal open={infoOpen} onClose={()=>setInfoOpen(false)} {...INFO.oglan}/>
<span style={gLbl}>{TL.kaarten} {winScore} {TL.bereikt}</span>
<div style={{display:"flex",gap:10,marginBottom:24}}>
{displayNames.map((n,i)=>{const score=displayTotals[i],lead=score===maxD&&score>0,close=score>=winScore-2;return(<div key={i} style={{flex:1,background:GC.surface,borderRadius:14,padding:"14px 6px",textAlign:"center",border:`2px solid ${lead?GC.orange:close?GC.gold:"transparent"}`}}><div style={{fontSize:"0.65rem",color:GC.muted,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n}</div><div style={{fontSize:"1.8rem",fontWeight:800,color:lead?GC.orange:close?GC.gold:GC.text}}>{score}</div><div style={{fontSize:"0.55rem",color:GC.muted,marginTop:2}}>/ {winScore}</div></div>);})}
</div>
<div style={gCard}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<div style={{fontWeight:700,color:GC.orange}}>{TL.ronde} {rounds.length+1}</div>
{rounds.length>0&&<button onPointerDown={undoRound} style={{padding:"4px 10px",borderRadius:8,border:"1.5px solid rgba(201,106,106,0.4)",background:"transparent",color:GC.red,fontSize:"0.72rem",fontWeight:700,...TAP}}>{TL.ongedaan}</button>}
</div>
<span style={gLbl}>{TL.hoeveel5.replace("{s}",ptsLabel)} (totaal = 5)</span>
<div style={{display:"grid",gridTemplateColumns:nP===2?"1fr 1fr":nP===3?"1fr 1fr 1fr":"1fr 1fr 1fr 1fr",gap:10,marginBottom:12}}>
{players.map((name,i)=>(<div key={i}><div style={{fontSize:"0.72rem",color:GC.muted,marginBottom:6,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{name}</div><input type="number" inputMode="numeric" placeholder="0" min="0" max="5" value={pts[i]} onChange={e=>setPt(i,e.target.value)} style={{width:"100%",background:GC.input,border:"2px solid #3a2a10",borderRadius:10,padding:"14px 4px",color:GC.text,fontSize:"1.3rem",fontWeight:800,textAlign:"center",outline:"none"}}/></div>))}
</div>
{(()=>{const current=players.reduce((s,_,i)=>s+(parseInt(pts[i])||0),0);const ok=current===5;return <div style={{fontSize:"0.72rem",textAlign:"center",marginBottom:12,color:ok?GC.green:GC.muted}}>Totaal: {current}/5 {ok?"✓":""}</div>;})()}
{mode==="2v2"&&nP===4&&<div style={{fontSize:"0.72rem",color:GC.muted,marginBottom:12,textAlign:"center"}}>🔵 {names[0]}+{names[2]} vs 🔴 {names[1]}+{names[3]}</div>}
<Btn onTap={saveRound} style={{background:GC.orange,color:"#0d0d14"}}>{TL.rondeOpslaan}</Btn>
</div>
{rounds.length>0&&(<div style={{...gCard,overflowX:"auto"}}><span style={gLbl}>{TL.geschiedenis}</span><table style={{width:"100%",borderCollapse:"collapse",fontSize:"0.78rem"}}><thead><tr><th style={{textAlign:"left",padding:"4px 6px 8px",color:GC.muted,fontSize:"0.68rem"}}>{TL.ronde}</th>{(mode==="2v2"&&nP===4?[`${names[0]}+${names[2]}`,`${names[1]}+${names[3]}`]:names.slice(0,nP)).map((n,i)=><th key={i} style={{textAlign:"center",padding:"4px 6px 8px",color:GC.muted,fontSize:"0.68rem"}}>{n}</th>)}</tr></thead><tbody>{rounds.map((r,ri)=>(<tr key={ri}><td style={{padding:"8px 6px",borderTop:"1px solid rgba(255,255,255,0.05)",color:GC.muted,fontSize:"0.68rem"}}>R{ri+1}</td>{(mode==="2v2"&&nP===4?[r.scores[0],r.scores[1]]:[...r.scores]).map((s,i)=>(<td key={i} style={{textAlign:"center",padding:"8px 6px",borderTop:"1px solid rgba(255,255,255,0.05)",color:s>0?GC.green:GC.muted,fontWeight:s>0?700:400}}>{s}</td>))}</tr>))}</tbody><tfoot><tr><td style={{padding:"10px 6px 4px",color:GC.muted,fontSize:"0.68rem",borderTop:"2px solid rgba(255,153,102,0.25)"}}>{TL.totaal}</td>{(mode==="2v2"&&nP===4?displayTotals:totals).map((tt,i)=><td key={i} style={{textAlign:"center",padding:"10px 6px 4px",fontWeight:800,color:GC.orange,borderTop:"2px solid rgba(255,153,102,0.25)"}}>{tt}</td>)}</tr></tfoot></table></div>)}
<Btn onTap={reset} style={{background:"transparent",color:GC.red,border:"2px solid rgba(201,106,106,0.3)",marginTop:8}}>{TL.nieuwSpel}</Btn>
</div>);}
// ── APP ROOT ──
function App(){
const [lang,setLang]=useState(getLang());
const [game,setGame]=useState(null);
function handleLangChange(l){setLangPref(l);setLang(l);}
if(!game)return <Menu onSelect={setGame} lang={lang} onLangChange={handleLangChange}/>;
if(game==='okey')return <OkeyApp onBack={()=>setGame(null)} lang={lang}/>;
if(game==='batak')return <BatakApp onBack={()=>setGame(null)} lang={lang}/>;
if(game==='pishti')return <PishtiApp onBack={()=>setGame(null)} lang={lang}/>;
if(game==='trix')return <TrixApp onBack={()=>setGame(null)} lang={lang}/>;
if(game==='oglan')return <OglanApp onBack={()=>setGame(null)} lang={lang}/>;
return <Menu onSelect={setGame} lang={lang} onLangChange={handleLangChange}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
